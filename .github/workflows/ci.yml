name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs of the same workflow on the same branch when a
# new push lands — keeps the queue short on rapid iteration.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  invariants:
    # AST checks are <1s and require no third-party deps. Failing here
    # prevents the rest of CI from spending minutes only to surface a
    # drift-prevention violation. Block the rest on this job.
    name: Drift-prevention invariants (AST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/checks/scan_invariant_check.py

  sdd_checks:
    # Spec-Driven Development checks added 2026-05-15/16. These are
    # pure-Python doc scanners — no third-party deps, run in <2s total.
    # Run in parallel with invariants since they're independent. The
    # ``fetch-depth: 0`` checkout is REQUIRED for scan_skill_freshness
    # to read ``git log`` history of cited source files.
    name: SDD spec-vs-code drift detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for `git log -1` per file
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Static check — §3 Reference Python quotes still appear in source.
      # Hard gate; failure means a skill is documenting code that no
      # longer exists in the form shown. Should always pass on main.
      - name: SDD — §3 quotes still match source
        run: python3 scripts/checks/scan_skill_quotes_match.py

      # Static check — skill footer dates vs. git-mtime of cited source.
      # Hard gate as of 2026-05-15 housekeeping pass (task #7 cleared
      # the 9 stale skills that were the baseline failure). A new failure
      # here means: a contributor modified a source file but didn't
      # re-stamp the cited skill's footer. Fix is to re-verify §3 and
      # bump the footer date.
      - name: SDD — skill footers vs. cited-source mtime
        run: python3 scripts/checks/scan_skill_freshness.py

      # Refresh the traceability matrix and fail CI if it would have
      # changed — keeps ``docs/traceability.md`` in sync with the
      # skill ↔ source ↔ test reality without requiring contributors
      # to remember to regenerate it.
      - name: SDD — traceability matrix is current
        run: |
          python3 scripts/checks/build_traceability.py
          if ! git diff --exit-code docs/traceability.md; then
            echo "::error::docs/traceability.md is stale."
            echo "::error::Run 'python3 scripts/checks/build_traceability.py'"
            echo "::error::and commit the result."
            exit 1
          fi

      # Decoupling invariant (skill 19 §1, added 2026-05-21). Dry-run
      # cycles write to ``signals_dryrun.jsonl``; live consumers must
      # never read it. This grep gate enforces that production code
      # stays on ``signals_live.jsonl`` so dry-run pollution is
      # structurally impossible. See scripts/checks/scan_dryrun_isolation.py
      # for the ALLOWED_PATHS exemption list.
      - name: SDD — dry-run/live journal isolation
        run: python3 scripts/checks/scan_dryrun_isolation.py

  tests:
    name: Unit tests + smoke checks
    # Wait for BOTH gates — invariants and SDD static checks. Failing
    # either short-circuits the matrix so we don't waste 3 Python-
    # version runners on a known-broken commit.
    needs: [invariants, sdd_checks]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.14 added 2026-05-06 to catch the inverse of the bug that
        # exposed this gap: Python 3.14's PEP 649 deferred annotation
        # evaluation hides missing-import errors in function signatures
        # that 3.11/3.12 catch eagerly.  Testing all three keeps the
        # codebase honest in both directions — code that runs on 3.14
        # but trips on 3.11/3.12 (e.g. missing `Any` in a typing import)
        # and code that uses 3.14-only features that won't run on the
        # older floor.  Most modules already opt-in to PEP 563 / PEP 649
        # semantics via `from __future__ import annotations`, but the
        # matrix is the structural guardrail that catches the rest.
        python-version: ["3.11", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest (full repo suite — includes tests/conformance/)
        # The conformance/ subdir is picked up by pytest's default
        # recursive discovery (no testpaths config), so the SDD-Tier-1
        # conformance assertions run alongside every module test.
        run: pytest tests/ -v --maxfail=10

      # Smoke checks run after pytest so unit-test regressions surface
      # first (they're cheaper to bisect). Each check is self-contained
      # and fast (<5s); failing any of them blocks the merge because they
      # guard the live ↔ backtest unification.
      - name: Smoke check — scan diagnostics
        run: python3 scripts/checks/run_scan_diagnostics_check.py

      - name: Smoke check — journal split
        run: python3 scripts/checks/run_journal_split_check.py

      # NOTE: run_unified_backtest_check.py and run_live_vs_backtest_parity_check.py
      # were retired 2026-05-04 with the backtest rewrite (skill 15). They
      # exercised Backtester._build_alpaca_plan_via_decide, a method that
      # no longer exists. Live ↔ backtest parity is now structural — the
      # backtest package wires through decide() directly — and the AST
      # invariant scanner (scan_invariant_check.py invariant #3) plus
      # tests/test_backtest/ cover what those scripts proved.
