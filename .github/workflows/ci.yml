name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs of the same workflow on the same branch when a
# new push lands — keeps the queue short on rapid iteration.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  invariants:
    # AST checks are <1s and require no third-party deps. Failing here
    # prevents the rest of CI from spending minutes only to surface a
    # drift-prevention violation. Block the rest on this job.
    name: Drift-prevention invariants (AST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 scripts/checks/scan_invariant_check.py

  tests:
    name: Unit tests + smoke checks
    needs: invariants
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.14 added 2026-05-06 to catch the inverse of the bug that
        # exposed this gap: Python 3.14's PEP 649 deferred annotation
        # evaluation hides missing-import errors in function signatures
        # that 3.11/3.12 catch eagerly.  Testing all three keeps the
        # codebase honest in both directions — code that runs on 3.14
        # but trips on 3.11/3.12 (e.g. missing `Any` in a typing import)
        # and code that uses 3.14-only features that won't run on the
        # older floor.  Most modules already opt-in to PEP 563 / PEP 649
        # semantics via `from __future__ import annotations`, but the
        # matrix is the structural guardrail that catches the rest.
        python-version: ["3.11", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest (full repo suite)
        run: pytest tests/ -v --maxfail=10

      # Smoke checks run after pytest so unit-test regressions surface
      # first (they're cheaper to bisect). Each check is self-contained
      # and fast (<5s); failing any of them blocks the merge because they
      # guard the live ↔ backtest unification.
      - name: Smoke check — scan diagnostics
        run: python3 scripts/checks/run_scan_diagnostics_check.py

      - name: Smoke check — journal split
        run: python3 scripts/checks/run_journal_split_check.py

      # NOTE: run_unified_backtest_check.py and run_live_vs_backtest_parity_check.py
      # were retired 2026-05-04 with the backtest rewrite (skill 15). They
      # exercised Backtester._build_alpaca_plan_via_decide, a method that
      # no longer exists. Live ↔ backtest parity is now structural — the
      # backtest package wires through decide() directly — and the AST
      # invariant scanner (scan_invariant_check.py invariant #3) plus
      # tests/test_backtest/ cover what those scripts proved.
